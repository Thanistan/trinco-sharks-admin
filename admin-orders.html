<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orders — Savoria Admin</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="admin.css">
  <style>
    .order-detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
    .detail-box { background: var(--bg-section); border: 1px solid var(--border); padding: 14px; border-radius: 10px; }
    .detail-box label { font-size: 0.75rem; color: var(--text-muted); font-weight: 700; display: block; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 1px; }
    .detail-box span { font-size: 0.9rem; font-weight: 600; }
    .order-items-list { margin-bottom: 20px; }
    .order-items-list .oi { display: flex; gap: 12px; align-items: center; padding: 12px; background: var(--bg-section); border-radius: 8px; margin-bottom: 8px; }
    .order-items-list .oi img { width: 48px; height: 48px; border-radius: 8px; object-fit: cover; }
    .order-items-list .oi-info { flex: 1; }
    .order-items-list .oi-name { font-weight: 600; font-size: 0.9rem; }
    .order-items-list .oi-sub { font-size: 0.8rem; color: var(--text-muted); }
    .order-items-list .oi-price { font-weight: 700; color: var(--amber); font-family: 'Playfair Display', serif; }
    .status-select { padding: 8px 12px; border-radius: 50px; border: 1px solid var(--border); background: var(--bg-card); color: var(--text-main); font-size: 0.85rem; cursor: pointer; font-family: inherit; }
    .status-select:focus { border-color: var(--amber); outline: none; }
    .empty-orders { text-align: center; padding: 60px; color: var(--text-muted); }
    .empty-orders .empty-icon { font-size: 4rem; margin-bottom: 16px; }
    .stats-strip { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
    .strip-card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 20px; display: flex; align-items: center; gap: 16px; }
    .strip-icon { width: 44px; height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; flex-shrink: 0; }
    .strip-info strong { display: block; font-size: 1.3rem; font-family: 'Playfair Display', serif; }
    .strip-info span { font-size: 0.8rem; color: var(--text-muted); }
    @media (max-width: 900px) { .stats-strip { grid-template-columns: 1fr 1fr; } .order-detail-grid { grid-template-columns: 1fr; } }
    @media (max-width: 480px) { .stats-strip { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<div class="admin-layout">

  <aside class="admin-sidebar" id="adminSidebar">
    <div class="sidebar-brand">
      <div class="logo">Sav<span>oria</span></div>
      <div class="role">Admin Panel</div>
    </div>
    <nav class="sidebar-nav">
      <div class="sidebar-section-label">Main</div>
      <a href="admin-dashboard.html"><span class="nav-icon">📊</span> Dashboard</a>
      <a href="admin-food.html"><span class="nav-icon">🍽</span> Food Items</a>
      <a href="admin-orders.html" class="active"><span class="nav-icon">🧾</span> Orders</a>
      <div class="sidebar-section-label">Settings</div>
      <a href="index.html" target="_blank"><span class="nav-icon">🌐</span> View Website</a>
      <a href="#" onclick="toggleTheme()"><span class="nav-icon">🌙</span> Toggle Theme</a>
    </nav>
    <div class="sidebar-footer">
      <button class="logout-btn" onclick="adminLogout()"><span>🚪</span> Logout</button>
    </div>
  </aside>

  <main class="admin-main">
    <div class="admin-topbar">
      <div style="display:flex;align-items:center;gap:12px;">
        <button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>
        <div class="admin-topbar-left">
          <div class="page-title">Orders</div>
          <div class="page-breadcrumb">Admin / Order Management</div>
        </div>
      </div>
      <div class="admin-topbar-right">
        <button class="theme-toggle">🌙</button>
        <button class="btn btn-outline" onclick="addDemoOrders()" style="padding:10px 16px;font-size:0.85rem;">+ Add Demo Orders</button>
        <div class="admin-avatar">A</div>
      </div>
    </div>

    <div class="admin-content">
      <!-- Stats strip -->
      <div class="stats-strip" id="statsStrip"></div>

      <!-- Status filter -->
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px;" id="statusFilters">
        <button class="filter-chip active" onclick="filterByStatus('All',this)">All</button>
        <button class="filter-chip" onclick="filterByStatus('Pending',this)">⏳ Pending</button>
        <button class="filter-chip" onclick="filterByStatus('Preparing',this)">🍳 Preparing</button>
        <button class="filter-chip" onclick="filterByStatus('Ready',this)">📦 Ready</button>
        <button class="filter-chip" onclick="filterByStatus('Completed',this)">✅ Completed</button>
        <button class="filter-chip" onclick="filterByStatus('Cancelled',this)">❌ Cancelled</button>
      </div>

      <!-- Orders table -->
      <div class="data-table-wrap">
        <div class="table-header">
          <h3>Order List <span id="orderCount" style="font-weight:400;color:var(--text-muted);font-size:0.9rem;"></span></h3>
          <div class="table-search-wrap">
            <input type="text" class="table-search" placeholder="Search orders…" id="orderSearch" oninput="renderOrders()">
          </div>
        </div>
        <div style="overflow-x:auto;">
          <table>
            <thead>
              <tr>
                <th>Order ID</th>
                <th>Customer</th>
                <th>Phone</th>
                <th>Items</th>
                <th>Total</th>
                <th>Payment</th>
                <th>Status</th>
                <th>Date</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="ordersTableBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- Order Detail Modal -->
<div class="modal-overlay" id="orderModal">
  <div class="modal" style="max-width:620px;">
    <div class="modal-header">
      <h3 id="orderModalTitle">Order Details</h3>
      <button class="modal-close" onclick="closeOrderModal()">✕</button>
    </div>
    <div id="orderModalContent"></div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeOrderModal()">Close</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
<script type="module">
  import { db, collection, doc, updateDoc, onSnapshot, addDoc, query, orderBy } from './js/firebase-config.js';

  if (sessionStorage.getItem('sav_admin_auth') !== 'true') window.location.href = 'admin-login.html';
  window.adminLogout = function() { sessionStorage.removeItem('sav_admin_auth'); window.location.href = 'admin-login.html'; }
  window.toggleSidebar = function() { document.getElementById('adminSidebar').classList.toggle('open'); }

  // ✅ Firebase-இல் இருந்து real-time orders
  let allOrders = [];
  let activeStatus = 'All';

  // Real-time listener — customer order போட்டவுடனே admin-க்கு வரும்!
  const ordersRef = collection(db, 'orders');
  const ordersQuery = query(ordersRef, orderBy('createdAt', 'desc'));

  onSnapshot(ordersQuery, (snapshot) => {
    allOrders = snapshot.docs.map(d => ({ _docId: d.id, ...d.data() }));
    updateStats();
    renderOrders();
    // புதுசா order வந்தா notification காட்டு
    snapshot.docChanges().forEach(change => {
      if (change.type === 'added' && allOrders.length > 1) {
        const o = change.doc.data();
        showToast(`🔔 New Order! ${o.id} — ${o.customer?.name || ''}`);
      }
    });
  });

  window.filterByStatus = function(status, btn) {
    activeStatus = status;
    document.querySelectorAll('#statusFilters .filter-chip').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    renderOrders();
  }

  function getFilteredOrders() {
    let orders = [...allOrders];
    const q = document.getElementById('orderSearch').value.trim().toLowerCase();
    if (activeStatus !== 'All') orders = orders.filter(o => o.status === activeStatus);
    if (q) orders = orders.filter(o => o.id.toLowerCase().includes(q) || (o.customer?.name || '').toLowerCase().includes(q));
    return orders;
  }

  function updateStats() {
    const all = allOrders;
    const pending   = all.filter(o => o.status === 'Pending').length;
    const preparing = all.filter(o => o.status === 'Preparing').length;
    const completed = all.filter(o => o.status === 'Completed').length;
    const revenue   = all.reduce((s,o) => s + (o.total||0), 0);
    document.getElementById('statsStrip').innerHTML = `
      <div class="strip-card"><div class="strip-icon" style="background:rgba(244,169,42,0.1);">💰</div><div class="strip-info"><strong>$${revenue.toFixed(2)}</strong><span>Total Revenue</span></div></div>
      <div class="strip-card"><div class="strip-icon" style="background:rgba(239,68,68,0.1);">⏳</div><div class="strip-info"><strong>${pending}</strong><span>Pending</span></div></div>
      <div class="strip-card"><div class="strip-icon" style="background:rgba(59,130,246,0.1);">🍳</div><div class="strip-info"><strong>${preparing}</strong><span>Preparing</span></div></div>
      <div class="strip-card"><div class="strip-icon" style="background:rgba(34,197,94,0.1);">✅</div><div class="strip-info"><strong>${completed}</strong><span>Completed</span></div></div>`;
  }

  const pmLabels = { card:'💳 Card', paypal:'🅿 PayPal', cash:'💵 Cash' };

  function renderOrders() {
    const orders = getFilteredOrders();
    document.getElementById('orderCount').textContent = `(${orders.length})`;
    const tbody = document.getElementById('ordersTableBody');
    if (!orders.length) {
      tbody.innerHTML = `<tr><td colspan="9"><div class="empty-orders"><div class="empty-icon">📭</div><p>No orders yet.</p><p style="margin-top:8px;font-size:0.85rem;color:var(--text-muted);">Customer orders will appear here instantly 🔥</p></div></td></tr>`;
      return;
    }
    tbody.innerHTML = orders.map(o => `
      <tr>
        <td><code style="font-size:0.78rem;color:var(--amber)">${o.id}</code></td>
        <td>
          <strong>${o.customer?.name||'—'}</strong>
          <div style="font-size:0.78rem;color:var(--text-muted)">${o.customer?.email||''}</div>
        </td>
        <td style="font-size:0.85rem;">${o.customer?.phone||'—'}</td>
        <td>${(o.items||[]).length} item(s)</td>
        <td><strong>$${(o.total||0).toFixed(2)}</strong></td>
        <td style="font-size:0.85rem;">${pmLabels[o.paymentMethod]||o.paymentMethod||'—'}</td>
        <td>
          <select class="status-select" onchange="updateStatus('${o._docId}', '${o.id}', this.value)">
            ${['Pending','Preparing','Ready','Completed','Cancelled'].map(s => `<option ${o.status===s?'selected':''}>${s}</option>`).join('')}
          </select>
        </td>
        <td style="color:var(--text-muted);font-size:0.82rem;white-space:nowrap;">${new Date(o.date).toLocaleString()}</td>
        <td>
          <button class="action-btn action-edit" onclick="viewOrder('${o._docId}')">👁 View</button>
        </td>
      </tr>`).join('');
  }

  // ✅ Firebase-ல் status update
  window.updateStatus = async function(docId, orderId, newStatus) {
    try {
      await updateDoc(doc(db, 'orders', docId), { status: newStatus });
      showToast(`✅ ${orderId} → ${newStatus}`);
    } catch(e) {
      console.error(e);
      showToast('❌ Update failed');
    }
  }

  window.viewOrder = function(docId) {
    const o = allOrders.find(x => x._docId === docId);
    if (!o) return;
    document.getElementById('orderModalTitle').textContent = `Order ${o.id}`;
    document.getElementById('orderModalContent').innerHTML = `
      <div class="order-detail-grid">
        <div class="detail-box"><label>Customer</label><span>${o.customer?.name||'—'}</span></div>
        <div class="detail-box"><label>Phone</label><span>${o.customer?.phone||'—'}</span></div>
        <div class="detail-box"><label>Email</label><span>${o.customer?.email||'—'}</span></div>
        <div class="detail-box"><label>Address</label><span>${o.customer?.address||'—'}</span></div>
        <div class="detail-box"><label>Payment</label><span>${pmLabels[o.paymentMethod]||o.paymentMethod||'—'}</span></div>
        <div class="detail-box"><label>Order Date</label><span>${new Date(o.date).toLocaleString()}</span></div>
        ${o.customer?.notes ? `<div class="detail-box" style="grid-column:1/-1"><label>Notes</label><span>${o.customer.notes}</span></div>` : ''}
      </div>
      <div class="order-items-list">
        <h4 style="margin-bottom:12px;font-size:1rem;">Items Ordered</h4>
        ${(o.items||[]).map(i => `
          <div class="oi">
            <img src="${i.image}" alt="${i.name}" onerror="this.src='https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=100&q=80'">
            <div class="oi-info">
              <div class="oi-name">${i.name}</div>
              <div class="oi-sub">${i.category} · $${i.price.toFixed(2)} each · ×${i.qty}</div>
            </div>
            <div class="oi-price">$${(i.price*i.qty).toFixed(2)}</div>
          </div>`).join('')}
      </div>
      <div style="background:linear-gradient(135deg,rgba(244,169,42,0.08),transparent);border:1px solid rgba(244,169,42,0.2);border-radius:12px;padding:16px 20px;display:flex;justify-content:space-between;align-items:center;">
        <strong>Order Total</strong>
        <span style="font-family:'Playfair Display',serif;font-size:1.5rem;color:var(--amber);font-weight:700;">$${(o.total||0).toFixed(2)}</span>
      </div>
      <div style="margin-top:16px;">
        <label class="admin-form-label">Update Status</label>
        <select class="admin-form-input" onchange="updateStatus('${o._docId}','${o.id}',this.value); closeOrderModal();">
          ${['Pending','Preparing','Ready','Completed','Cancelled'].map(s=>`<option ${o.status===s?'selected':''}>${s}</option>`).join('')}
        </select>
      </div>`;
    document.getElementById('orderModal').classList.add('open');
  }

  window.closeOrderModal = function() { document.getElementById('orderModal').classList.remove('open'); }
  document.getElementById('orderModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeOrderModal(); });

  // Search
  document.getElementById('orderSearch').addEventListener('input', renderOrders);

  // ✅ Demo orders — Firebase-லயே save ஆகும்
  window.addDemoOrders = async function() {
    const menu = DB.getMenu();
    const names = ['Sarah Mitchell','James Rodriguez','Aisha Thompson','Wei Chen','Carlos Mendez'];
    const statuses = ['Pending','Preparing','Completed','Pending','Ready'];
    const methods = ['card','paypal','cash','card','cash'];
    for (let i = 0; i < names.length; i++) {
      const items = [menu[i % menu.length], menu[(i+2) % menu.length]].map(item => ({
        id: item.id, name: item.name, price: item.price,
        qty: Math.floor(Math.random()*2)+1, image: item.image, category: item.category
      }));
      const subtotal = items.reduce((s,it) => s + it.price * it.qty, 0);
      const total = subtotal + 3.99 + subtotal * 0.08;
      await addDoc(collection(db, 'orders'), {
        id: 'ORD-' + (Date.now() - i * 100000),
        date: new Date(Date.now() - i * 3600000 * 4).toISOString(),
        createdAt: new Date(Date.now() - i * 3600000 * 4),
        customer: { name: names[i], phone: '+1 (555) ' + (100+i*111), email: names[i].toLowerCase().replace(' ','.') + '@email.com', address: (100+i*10) + ' Main St, New York, NY', notes: '' },
        items, total, paymentMethod: methods[i], status: statuses[i]
      });
    }
    showToast('✅ Demo orders added to Firebase!');
  }
</script>
</body>
</html>
